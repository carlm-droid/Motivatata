<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivatata ✨</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2 class="title">Motivatata ✨</h2>
        <div class="subtitle">Your daily armed dose of power</div>

        <!-- 🔐 Auth Section -->
        <div id="authSection">
            <h3 id="authTitle" style="margin: 0 0 10px; font-size: 16px;">Login</h3>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            
            <div id="extraSignupFields" class="hidden">
                <input type="text" id="name" placeholder="First Name">
                <input type="number" id="age" placeholder="Age" min="1">
                <select id="gender">
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <button id="authBtn">Log In</button>
            <div class="toggle-auth" id="toggleAuthBtn">Don't have an account? Sign Up</div>
        </div>

        <!-- ⚙️ App Dashboard -->
        <div id="dashboardSection" class="hidden">
            <p id="welcomeMsg" style="font-weight: bold; color: var(--primary); font-size: 14px; margin-bottom: 8px;"></p>
            
            <!-- ⏱️ اختيار التكرار بالساعات -->
            <div class="timer-box">
                <label for="notificationInterval">Notification Interval ⏱️:</label>
                <select id="notificationInterval">
                    <option value="1">Every 1 Hour</option>
                    <option value="2">Every 2 Hours</option>
                    <option value="3">Every 3 Hours</option>
                    <option value="6">Every 6 Hours</option>
                    <option value="12">Every 12 Hours</option>
                    <option value="24">Once a Day (24 Hours)</option>
                </select>

                <!-- 🌐 اختيار لغة الإشعارات -->
                <label for="notificationLang" style="margin-top: 8px;">Notification Language 🌐:</label>
                <select id="notificationLang">
                    <option value="mix">🔀 Mix (All Languages / مشكل)</option>
                    <option value="ar">العربية (Arabic)</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="franco">Lebanese Franco (Arabizi) 🇱🇧</option>
                </select>

                <button id="saveIntervalBtn" style="padding: 6px; font-size: 12px; margin-top: 8px;">Save Settings</button>
            </div>
            
            <button id="enablePushBtn" style="margin-top: 12px;">Enable Push Notifications 🔔</button>
            <button id="logoutBtn" style="background: #334155; color: #fff; margin-top: 6px;">Log Out</button>
        </div>

        <p id="status"></p>
    </div>

    <!-- 🔥 Firebase App & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 🧠 مولد العبارات الـ 3000 المدمج
        const templates = {
            ar: {
                titles: ["Motivatata ✨", "جرعة طاقة ⚡", "خليك قوي 🌟", "سر النجاح 🎯", "طاقة اليوم 🔋"],
                starts: ["تذكر دائماً أن", "لا تنسَ أن", "استمر لأن", "اعلم أن", "كل يوم هو فرصة لأن", "أنت قادر على أن"],
                actions: ["تتخطى الصعاب", "تصل إلى أهدافك", "تبني مستقبلك", "تصنع فرقاً حقيقياً", "تتجاوز حدودك", "تحقق أحلامك"],
                results: ["بشجاعة وإصرار. 💪", "لأن الاستمرارية هي السر. 🚀", "فالنجاح ينتظر من يسعى. 🔥", "دون التلفت للأعذار. 💡", "بخطوات ثابتة يومياً. 🌟"]
            },
            en: {
                titles: ["Motivatata ✨", "Power Dose ⚡", "Stay Strong 🔥", "Daily Fuel 🚀", "Break Limits 💡"],
                starts: ["Always remember that", "Never forget that", "Keep going because", "Every single day is a chance to", "You have the power to", "Stay focused and"],
                actions: ["push through challenges", "reach your ultimate goals", "build the future you dream of", "make a real difference", "break your limits", "achieve greatness"],
                results: ["with determination. 💪", "because consistency is key. 🚀", "success belongs to the persistent. 🔥", "leaving excuses behind. 🎯", "one step at a time. 🌟"]
            },
            fr: {
                titles: ["Motivatata ✨", "Dose d'énergie ⚡", "Reste Fort 🔥", "Focus & Gagne 🎯", "Force Du Jour 💡"],
                starts: ["Rappelle-toi toujours que", "N'oublie jamais que", "Continue parce que", "Chaque jour est une opportunité pour", "Tu as le pouvoir de", "Reste concentré pour"],
                actions: ["surmonter les obstacles", "atteindre tes objectifs", "construire ton avenir", "faire une vraie différence", "dépasser tes limites", "accomplir de grandes choses"],
                results: ["avec détermination. 💪", "car la régularité est la clé. 🚀", "le succès appartient aux persévérants. 🔥", "en laissant les excuses de côté. 🎯", "un pas à la fois. 🌟"]
            },
            franco: {
                titles: ["Motivatata ✨", "Power Dose ⚡", "Khallik 2awi 🔥", "Rakkez w Rba7 🎯", "Ta2a 3al Sobe7 🔋"],
                starts: ["Tzakkar deyman 2enno", "Ma tansa 2enno", "Kammel la2enno", "Kull yowm hewe fursa la", "2enta 2adir 2ennak", "Khallik mrakkez la"],
                actions: ["tet3adda l me7an", "toe3al la ahdafak", "tebne mastaqbalak", "te3mol far2 kbir", "tetjawaz 7dodak", "te7a22e2 2a7lamak"],
                results: ["b 2israr w 2awwe. 💪", "la2enno l estemraréye heye l serr. 🚀", "l neja7 la elli byes3a. 🔥", "bdoen a3zar. 🎯", "khetwe khetwe kull yowm. 🌟"]
            }
        };

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomQuote(lang = 'mix') {
            let selectedLang = lang;
            if (lang === 'mix') {
                const langs = ['ar', 'en', 'fr', 'franco'];
                selectedLang = getRandomElement(langs);
            }
            const data = templates[selectedLang] || templates.ar;
            return {
                title: getRandomElement(data.titles),
                body: `${getRandomElement(data.starts)} ${getRandomElement(data.actions)} ${getRandomElement(data.results)}`
            };
        }

        // 🔥 Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAujJQC1DC7_weXGyq3O0kXqOhTV0F06sA",
            authDomain: "motivatata.firebaseapp.com",
            projectId: "motivatata",
            storageBucket: "motivatata.firebasestorage.app",
            messagingSenderId: "628570963688",
            appId: "1:628570963688:web:7676a2024fd30a0545d35d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const authTitle = document.getElementById('authTitle');
        const authBtn = document.getElementById('authBtn');
        const toggleAuthBtn = document.getElementById('toggleAuthBtn');
        const extraSignupFields = document.getElementById('extraSignupFields');
        const status = document.getElementById('status');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const notificationIntervalSelect = document.getElementById('notificationInterval');
        const notificationLangSelect = document.getElementById('notificationLang');

        let isSignUp = false;
        let currentUser = null;
        let notificationTimer = null;

        // Toggle Auth Mode
        toggleAuthBtn.addEventListener('click', () => {
            isSignUp = !isSignUp;
            authTitle.textContent = isSignUp ? "Create Account" : "Login";
            authBtn.textContent = isSignUp ? "Sign Up" : "Log In";
            toggleAuthBtn.textContent = isSignUp ? "Already have an account? Login" : "Don't have an account? Sign Up";
            extraSignupFields.classList.toggle('hidden', !isSignUp);
        });

        // Auth Submit
        authBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                alert('Please fill email and password!');
                return;
            }

            status.textContent = "Processing...";

            try {
                if (isSignUp) {
                    const name = document.getElementById('name').value.trim();
                    const age = document.getElementById('age').value.trim();
                    const gender = document.getElementById('gender').value;

                    if (!name || !age || !gender) {
                        alert('Please fill all profile fields!');
                        status.textContent = "";
                        return;
                    }

                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", res.user.uid), {
                        name: name,
                        age: age,
                        gender: gender,
                        email: email,
                        intervalHours: "1",
                        lang: "mix"
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
                status.textContent = "";
            } catch (err) {
                status.textContent = err.message;
            }
        });

        // Auth State Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        welcomeMsg.textContent = `Welcome back, ${data.name}! ✨`;
                        if (data.intervalHours) notificationIntervalSelect.value = data.intervalHours;
                        if (data.lang) notificationLangSelect.value = data.lang;
                    } else {
                        welcomeMsg.textContent = `Welcome! ✨`;
                    }
                } catch(e) {
                    welcomeMsg.textContent = `Welcome! ✨`;
                }

                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
            } else {
                authSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                currentUser = null;
                if (notificationTimer) clearInterval(notificationTimer);
            }
        });

        // Save Settings
        document.getElementById('saveIntervalBtn').addEventListener('click', async () => {
            if (!currentUser) return;
            const selectedInterval = notificationIntervalSelect.value;
            const selectedLang = notificationLangSelect.value;

            try {
                await updateDoc(doc(db, "users", currentUser.uid), {
                    intervalHours: selectedInterval,
                    lang: selectedLang
                });
                status.textContent = `Settings saved! ⏱️ Every ${selectedInterval}h | 🌐 Mode: ${selectedLang.toUpperCase()}`;
                startNotificationSchedule(parseInt(selectedInterval), selectedLang);
            } catch (err) {
                status.textContent = "Error saving settings: " + err.message;
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (notificationTimer) clearInterval(notificationTimer);
            signOut(auth);
        });

        // Send Notification
        function sendLocalNotification(lang = 'mix') {
            if (Notification.permission === 'granted') {
                const randomQuote = getRandomQuote(lang);
                
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification(randomQuote.title, {
                            body: randomQuote.body,
                            icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
                        });
                    });
                } else {
                    new Notification(randomQuote.title, {
                        body: randomQuote.body,
                        icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
                    });
                }
            }
        }

        // Notification Schedule
        function startNotificationSchedule(hours, lang) {
            if (notificationTimer) clearInterval(notificationTimer);
            const intervalMs = hours * 60 * 60 * 1000;
            sendLocalNotification(lang);

            notificationTimer = setInterval(() => {
                sendLocalNotification(lang);
            }, intervalMs);
        }

        // Enable Push & Register SW
        document.getElementById('enablePushBtn').addEventListener('click', async () => {
            status.textContent = "Requesting permission...";
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    if ('serviceWorker' in navigator) {
                        await navigator.serviceWorker.register('./sw.js');
                    }
                    const hours = parseInt(notificationIntervalSelect.value || "1");
                    const lang = notificationLangSelect.value || "mix";
                    startNotificationSchedule(hours, lang);
                    status.textContent = "Push Notifications Active! 🎉";
                } else {
                    status.textContent = "Permission denied for notifications.";
                }
            } catch (err) {
                console.error(err);
                status.textContent = "Error: " + err.message;
            }
        });

        // Auto register SW on load
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
